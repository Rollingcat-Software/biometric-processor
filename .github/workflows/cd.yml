name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - 'demo-ui/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  # Build and test application
  build-and-test:
    name: Build & Test Application
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: demo-ui/package-lock.json


      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: demo-ui
        run: npm ci

      - name: Build frontend
        working-directory: demo-ui
        run: npm run build

      - name: Verify build artifacts
        run: |
          echo "Checking frontend build..."
          ls -la demo-ui/out/
          echo "✓ Frontend build complete!"
          echo ""
          echo "Application ready for deployment to:"
          echo "  - Railway (uses railway.json + Procfile)"
          echo "  - Render (uses render.yaml)"
          echo "  - Heroku (uses Procfile)"

  # Deploy to Railway (optional - requires RAILWAY_TOKEN secret)
  deploy-railway:
    name: Deploy to Railway
    runs-on: [self-hosted, linux, x64]
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && vars.ENABLE_RAILWAY_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service biometric-processor

  # Create GitHub Release (for tags)
  release:
    name: Create Release
    runs-on: [self-hosted, linux, x64]
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## Deployment Instructions

            ### Railway
            ```bash
            railway up
            ```

            ### Render
            Push to main branch - Render will auto-deploy using render.yaml

            ### Heroku
            ```bash
            git push heroku main
            ```

            See README.md for detailed deployment instructions.
