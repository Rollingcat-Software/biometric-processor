name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: fivucsas
  REGION: europe-west1
  SERVICE_NAME: biometric-api
  REGISTRY: europe-west1-docker.pkg.dev

jobs:
  # ===========================================
  # Build and Test
  # ===========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run linting
        run: |
          pip install ruff
          ruff check app/ --ignore E501

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml || true
        env:
          DATABASE_URL: "postgresql://test:test@localhost/test"
          REDIS_URL: "redis://localhost:6379"

  # ===========================================
  # Docker Build Test
  # ===========================================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.SERVICE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 8080:8080 \
            -e DATABASE_URL="postgresql://test:test@localhost/test" \
            -e REDIS_URL="redis://localhost:6379" \
            -e SECRET_KEY="test-secret" \
            ${{ env.SERVICE_NAME }}:test

          # Wait for container to start
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Container is healthy!"
              curl -s http://localhost:8080/api/v1/health
              exit 0
            fi
            echo "Waiting for container... ($i/30)"
            sleep 2
          done

          echo "Container failed to start!"
          docker logs test-container
          exit 1

  # ===========================================
  # Deploy to GCP Cloud Run
  # ===========================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push to Artifact Registry
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=300 \
            --port=8080 \
            --set-env-vars="ENVIRONMENT=production"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')

          echo "Service URL: $SERVICE_URL"

          # Health check
          for i in {1..10}; do
            if curl -s "$SERVICE_URL/api/v1/health" | grep -q "healthy"; then
              echo "Deployment verified successfully!"
              exit 0
            fi
            echo "Waiting for service... ($i/10)"
            sleep 5
          done

          echo "Deployment verification failed!"
          exit 1

  # ===========================================
  # Notify on Failure
  # ===========================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build, deploy]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
