name: PR Validation

on:
  pull_request:
    branches: [main, dev]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - '.github/workflows/pr-validation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Check code formatting
        run: |
          pip install black
          black --check app/ || echo "Code formatting issues found"

      - name: Run linting
        run: |
          ruff check app/ --ignore E501

      - name: Check for dependency issues
        run: |
          pip check || echo "Dependency issues found"

      - name: Verify Docker build
        run: |
          docker build -t test-build . --no-cache

      - name: Security scan
        run: |
          pip install safety bandit
          safety check -r requirements.txt || echo "Security vulnerabilities found"
          bandit -r app/ -ll || echo "Security issues found"

      - name: Add PR comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `## PR Validation Results

            | Check | Status |
            |-------|--------|
            | Dependencies | ${{ job.status == 'success' && '✅' || '⚠️' }} |
            | Docker Build | ${{ job.status == 'success' && '✅' || '❌' }} |
            | Security Scan | ${{ job.status == 'success' && '✅' || '⚠️' }} |

            *Automated check by CI/CD pipeline*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
