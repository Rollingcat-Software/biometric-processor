steps:
  # Build using buildpacks with custom pip install sequence
  - name: 'gcr.io/k8s-skaffold/pack'
    args:
      - 'build'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/biometric-api'
      - '--builder=gcr.io/buildpacks/builder:v1'
      - '--env=GOOGLE_PYTHON_VERSION=3.11.11'
      - '--env=GOOGLE_ENTRYPOINT=python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/biometric-api']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'biometric-api'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/biometric-api'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=4Gi'
      - '--cpu=2'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/biometric-api'
