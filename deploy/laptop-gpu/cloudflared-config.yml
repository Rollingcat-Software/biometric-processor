# Cloudflare Tunnel configuration template
# Copy to ~/.cloudflared/config.yml and fill in your values
#
# Setup:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create biometric-api
#   3. cloudflared tunnel route dns biometric-api bpa-fivucsas.rollingcatsoftware.com
#   4. Copy this file to ~/.cloudflared/config.yml
#   5. cloudflared tunnel run biometric-api

tunnel: <YOUR_TUNNEL_ID>
credentials-file: /home/<YOUR_USER>/.cloudflared/<YOUR_TUNNEL_ID>.json

# Use http2 for maximum compatibility (works on eduroam, mobile, restrictive networks)
# Change to "auto" if you have a stable wired/home-wifi connection for better performance
protocol: http2

ingress:
  - hostname: bpa-fivucsas.rollingcatsoftware.com
    service: http://localhost:8001
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false
      # Keep alive for long-running requests (batch processing, proctoring)
      keepAliveTimeout: 90s
      keepAliveConnections: 10
  # Catch-all: return 404 for unmatched hostnames
  - service: http_status:404
