version: '3.9'

services:
  biometric-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biometric-api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      APP_NAME: "Biometric Processor API"
      VERSION: "1.0.0"
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      API_HOST: 0.0.0.0
      API_PORT: 8001
      PORT: 8001

      # Shared PostgreSQL (pgvector enabled on biometric_db)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@shared-postgres:5432/biometric_db
      DATABASE_POOL_MIN_SIZE: 2
      DATABASE_POOL_MAX_SIZE: 10
      EMBEDDING_DIMENSION: 512

      # Shared Redis (database 4 for biometric)
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      REDIS_DB: 4
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MAX_CONNECTIONS: 20

      # ML Configuration — CPU-optimized, lightweight
      FACE_DETECTION_BACKEND: opencv
      FACE_RECOGNITION_MODEL: Facenet512
      ASYNC_ML_ENABLED: true
      ML_THREAD_POOL_SIZE: 2
      EMBEDDING_CACHE_ENABLED: true
      EMBEDDING_CACHE_TTL: 300
      EMBEDDING_CACHE_MAX_SIZE: 500

      # Security
      CORS_ORIGINS: '["https://app.fivucsas.com","https://fivucsas.com","https://api.fivucsas.com"]'
      API_KEY_ENABLED: "true"
      API_KEY_REQUIRE_AUTH: "true"
      API_KEY_SECRET: ${API_KEY_SECRET}
      REQUIRE_HTTPS: "true"
      JWT_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}

      # Rate Limiting
      RATE_LIMIT_ENABLED: true
      RATE_LIMIT_STORAGE: memory
      RATE_LIMIT_PER_MINUTE: 60

      # File Storage
      UPLOAD_FOLDER: /app/uploads
      MAX_UPLOAD_SIZE: 10485760

      # Quality Thresholds
      VERIFICATION_THRESHOLD: 0.4
      QUALITY_THRESHOLD: 40.0
      BLUR_THRESHOLD: 15.0
      MIN_FACE_SIZE: 60

      # Demo UI disabled in production (security)
      DEMO_UI_ENABLED: "false"

      # TensorFlow
      TF_CPP_MIN_LOG_LEVEL: "2"
      DEEPFACE_HOME: /tmp/.deepface
    volumes:
      - biometric_uploads:/app/uploads
      - biometric_models:/tmp/.deepface
    labels:
      # SECURITY: No public Traefik route — biometric API is internal only.
      # Only identity-core-api can reach it via Docker network (biometric-api:8001).
      - "traefik.enable=false"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
          pids: 256
        reservations:
          cpus: '0.5'
          memory: 2.5G

networks:
  backend:
    external: true

volumes:
  biometric_uploads:
    driver: local
  biometric_models:
    driver: local
