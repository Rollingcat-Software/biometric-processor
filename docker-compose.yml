version: '3.8'

services:
  # Main Biometric Processor API
  biometric-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: biometric-processor:latest
    container_name: biometric-processor
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_STORAGE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - METRICS_ENABLED=true
      - DATABASE_URL=postgresql://biometric:biometric@postgres:5432/biometric
      - EMBEDDING_REPOSITORY_BACKEND=postgres
    volumes:
      - upload_data:/app/temp_uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - biometric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL with pgvector for embedding storage
  postgres:
    image: pgvector/pgvector:pg16
    container_name: biometric-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=biometric
      - POSTGRES_PASSWORD=biometric
      - POSTGRES_DB=biometric
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - biometric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biometric -d biometric"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: biometric-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - biometric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: biometric-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - biometric-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: biometric-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/biometric-processor.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - biometric-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  biometric-network:
    driver: bridge

volumes:
  upload_data:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
