apiVersion: v1
kind: Secret
metadata:
  name: biometric-processor-secrets
  namespace: biometric-processor
  labels:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database connection (override in production)
  DATABASE_URL: "postgresql://biometric:changeme@postgres:5432/biometric"

  # Redis connection (override in production)
  REDIS_URL: "redis://redis:6379/0"

  # API keys (override in production)
  API_KEY: "changeme-in-production"
  JWT_SECRET: "changeme-jwt-secret-in-production"
