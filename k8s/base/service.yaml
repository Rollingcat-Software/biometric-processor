apiVersion: v1
kind: Service
metadata:
  name: biometric-processor
  namespace: biometric-processor
  labels:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: api

---
apiVersion: v1
kind: Service
metadata:
  name: biometric-processor-headless
  namespace: biometric-processor
  labels:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: api
