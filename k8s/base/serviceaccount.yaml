apiVersion: v1
kind: ServiceAccount
metadata:
  name: biometric-processor
  namespace: biometric-processor
  labels:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: rbac
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: biometric-processor
  namespace: biometric-processor
  labels:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: biometric-processor
  namespace: biometric-processor
  labels:
    app.kubernetes.io/name: biometric-processor
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: biometric-processor
subjects:
  - kind: ServiceAccount
    name: biometric-processor
    namespace: biometric-processor
