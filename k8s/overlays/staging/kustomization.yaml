apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: biometric-processor-staging

nameSuffix: -staging

resources:
  - ../../base

commonLabels:
  environment: staging

patches:
  - patch: |-
      - op: replace
        path: /metadata/name
        value: biometric-processor-staging
    target:
      kind: Namespace
      name: biometric-processor
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
    target:
      kind: Deployment
      name: biometric-processor
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5
    target:
      kind: HorizontalPodAutoscaler
      name: biometric-processor
  - patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: biometric-api-staging.example.com
      - op: replace
        path: /spec/rules/0/host
        value: biometric-api-staging.example.com
    target:
      kind: Ingress
      name: biometric-processor

configMapGenerator:
  - name: biometric-processor-config
    behavior: merge
    literals:
      - LOG_LEVEL=DEBUG
      - METRICS_ENABLED=true
