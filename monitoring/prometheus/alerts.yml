groups:
  - name: biometric_processor_alerts
    rules:
      # =========================================================================
      # Service Availability Alerts
      # =========================================================================

      - alert: BiometricServiceDown
        expr: up{job="biometric-processor"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Biometric Processor service is down"
          description: "The Biometric Processor service has been down for more than 1 minute."
          runbook_url: "https://docs.example.com/runbooks/biometric-service-down"

      - alert: BiometricServiceHighRestarts
        expr: changes(biometric_process_start_time_seconds[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Biometric Processor restarting frequently"
          description: "The service has restarted {{ $value }} times in the last hour."

      # =========================================================================
      # Latency Alerts
      # =========================================================================

      - alert: BiometricHighLatencyP95
        expr: histogram_quantile(0.95, rate(biometric_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency detected"
          description: "95th percentile latency is {{ $value | printf \"%.2f\" }}s (threshold: 2s)."

      - alert: BiometricHighLatencyP99
        expr: histogram_quantile(0.99, rate(biometric_http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical request latency detected"
          description: "99th percentile latency is {{ $value | printf \"%.2f\" }}s (threshold: 5s)."

      - alert: BiometricMLInferenceSlowdown
        expr: histogram_quantile(0.95, rate(biometric_ml_inference_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML inference time is slow"
          description: "ML inference p95 latency is {{ $value | printf \"%.2f\" }}s for {{ $labels.model }}."

      # =========================================================================
      # Error Rate Alerts
      # =========================================================================

      - alert: BiometricHighErrorRate
        expr: |
          sum(rate(biometric_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(biometric_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | printf \"%.1f\" }}% (threshold: 5%)."

      - alert: BiometricCriticalErrorRate
        expr: |
          sum(rate(biometric_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(biometric_http_requests_total[5m])) > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | printf \"%.1f\" }}% (threshold: 10%)."

      - alert: BiometricFaceDetectionFailures
        expr: |
          sum(rate(biometric_face_operations_total{status="failure"}[5m]))
          /
          sum(rate(biometric_face_operations_total[5m])) > 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High face detection failure rate"
          description: "Face operation failure rate is {{ $value | printf \"%.1f\" }}%."

      # =========================================================================
      # Rate Limiting Alerts
      # =========================================================================

      - alert: BiometricHighRateLimitHits
        expr: sum(rate(biometric_rate_limit_hits_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit hits detected"
          description: "Rate limit is being hit {{ $value | printf \"%.1f\" }} times per second."

      # =========================================================================
      # Infrastructure Alerts
      # =========================================================================

      # Database
      - alert: BiometricDatabaseDown
        expr: biometric_db_connected == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection lost"
          description: "The database connection has been down for more than 1 minute."

      - alert: BiometricDatabasePoolExhausted
        expr: biometric_db_pool_available / biometric_db_pool_size < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Only {{ $value | printf \"%.0f\" }}% of database connections available."

      - alert: BiometricDatabaseSlowQueries
        expr: biometric_db_query_latency_seconds > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "Database query latency is {{ $value | printf \"%.2f\" }}s."

      # Redis
      - alert: BiometricRedisDown
        expr: biometric_redis_connected == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis connection lost"
          description: "The Redis connection has been down for more than 1 minute."

      - alert: BiometricRedisHighLatency
        expr: biometric_redis_latency_seconds > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Redis latency detected"
          description: "Redis latency is {{ $value | printf \"%.3f\" }}s."

      - alert: BiometricRedisHighMemory
        expr: biometric_redis_memory_used_bytes > 1073741824  # 1GB
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High Redis memory usage"
          description: "Redis is using {{ $value | humanize1024 }}B of memory."

      # ML Models
      - alert: BiometricMLModelNotLoaded
        expr: biometric_ml_model_loaded == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ML model not loaded"
          description: "ML model {{ $labels.model_name }} ({{ $labels.model_type }}) is not loaded."

      # =========================================================================
      # Resource Alerts
      # =========================================================================

      - alert: BiometricHighMemoryUsage
        expr: biometric_process_memory_percent > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Process memory usage is {{ $value | printf \"%.1f\" }}%."

      - alert: BiometricCriticalMemoryUsage
        expr: biometric_process_memory_percent > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage"
          description: "Process memory usage is {{ $value | printf \"%.1f\" }}%."

      - alert: BiometricHighCPUUsage
        expr: biometric_process_cpu_percent > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "Process CPU usage is {{ $value | printf \"%.1f\" }}%."

      - alert: BiometricHighFileDescriptors
        expr: biometric_process_open_fds / biometric_process_max_fds > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High file descriptor usage"
          description: "Using {{ $value | printf \"%.0f\" }}% of available file descriptors."

      - alert: BiometricHighThreadCount
        expr: biometric_process_threads > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High thread count detected"
          description: "Process has {{ $value }} threads running."

      # =========================================================================
      # Storage Alerts
      # =========================================================================

      - alert: BiometricHighEmbeddingCount
        expr: sum(biometric_embedding_storage_count) > 100000
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "High embedding storage count"
          description: "Total embeddings in storage: {{ $value }}."

      # =========================================================================
      # Request Volume Alerts
      # =========================================================================

      - alert: BiometricLowTraffic
        expr: sum(rate(biometric_http_requests_total[5m])) < 0.01
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Low traffic detected"
          description: "Request rate is very low ({{ $value | printf \"%.3f\" }} req/s)."

      - alert: BiometricHighTraffic
        expr: sum(rate(biometric_http_requests_total[5m])) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High traffic spike detected"
          description: "Request rate is {{ $value | printf \"%.0f\" }} req/s."
