# Render Blueprint - Biometric Processor
# Deploy: https://render.com/deploy?repo=https://github.com/Rollingcat-Software/biometric-processor

services:
  # Main Biometric API
  - type: web
    name: biometric-api
    runtime: python
    region: frankfurt  # EU region (oregon for US)
    plan: starter      # $7/month
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENVIRONMENT
        value: production
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: DEEPFACE_HOME
        value: /opt/render/.deepface
      - key: DATABASE_URL
        fromDatabase:
          name: biometric-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: biometric-cache
          type: redis
          property: connectionString

  # Redis Cache
  - type: redis
    name: biometric-cache
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # PostgreSQL 16 with pgvector support
  - name: biometric-db
    plan: starter        # $7/month, 1GB storage
    region: frankfurt
    databaseName: biometric
    user: biometric
    postgresMajorVersion: "16"
    # After deploy, enable pgvector:
    # psql $DATABASE_URL -c "CREATE EXTENSION IF NOT EXISTS vector;"
